{% for item in site.data.navigation %}
  {% unless item.key == "exploreCollections" and site.showNewNavItem == false %}
    {% if item.menu %}
      <div class="dropdown">
        <span>{{ item.text }}</span>
        <ul>
          {% for sub in item.menu %}
            <li><a href="{{ sub.href }}">{{ sub.text }}</a></li>
          {% endfor %}
        </ul>
      </div>
    {% else %}
      <a href="{{ item.href }}">{{ item.text }}</a>
    {% endif %}
  {% endunless %}
{% endfor %}
